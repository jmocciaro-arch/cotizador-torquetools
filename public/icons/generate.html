<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generar iconos PWA — TorqueTools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0B0E13;
      color: #E5E7EB;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { color: #FF6600; margin-bottom: 0.5rem; font-size: 1.5rem; }
    p.desc { color: #6B7280; margin-bottom: 2rem; font-size: 0.9rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .card canvas {
      border-radius: 20%;
      margin-bottom: 0.5rem;
      image-rendering: auto;
    }
    .card .size { color: #9CA3AF; font-size: 0.8rem; margin-bottom: 0.5rem; }
    .btn {
      display: inline-block;
      padding: 0.4rem 1rem;
      background: #FF6600;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #E65C00; }
    .btn-all {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 12px;
    }
    .note {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(255, 102, 0, 0.1);
      border: 1px solid rgba(255, 102, 0, 0.2);
      border-radius: 8px;
      color: #9CA3AF;
      font-size: 0.85rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Generador de iconos PWA</h1>
  <p class="desc">Genera y descarga los iconos PNG para el manifest.json de TorqueTools ERP.</p>

  <button class="btn btn-all" onclick="downloadAll()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
    </svg>
    Descargar todos los iconos
  </button>

  <div class="grid" id="grid"></div>

  <div class="note">
    <strong>Instrucciones:</strong> Descarga los iconos y ponelos en la carpeta <code>/public/icons/</code> del proyecto.
    Los nombres ya tienen el formato correcto (<code>icon-72.png</code>, <code>icon-96.png</code>, etc.).
  </div>

  <script>
    const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];
    const BG_COLOR = '#FF6600';
    const TEXT_COLOR = '#FFFFFF';
    const CORNER_RATIO = 0.1875; // 96/512

    function generateIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Fondo con esquinas redondeadas
      const radius = Math.round(size * CORNER_RATIO);
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = BG_COLOR;
      ctx.fill();

      // Texto "TT"
      const fontSize = Math.round(size * 0.55);
      ctx.font = `900 ${fontSize}px Arial, Helvetica, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = TEXT_COLOR;
      ctx.fillText('TT', size / 2, size / 2 + fontSize * 0.04);

      return canvas;
    }

    function downloadCanvas(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Generar la grilla
    const grid = document.getElementById('grid');
    const canvasMap = {};

    SIZES.forEach(size => {
      const canvas = generateIcon(size);
      canvasMap[size] = canvas;

      const card = document.createElement('div');
      card.className = 'card';

      // Canvas de preview (max 128px visual)
      const previewSize = Math.min(size, 128);
      const preview = document.createElement('canvas');
      preview.width = previewSize;
      preview.height = previewSize;
      preview.style.width = previewSize + 'px';
      preview.style.height = previewSize + 'px';
      const pctx = preview.getContext('2d');
      pctx.drawImage(canvas, 0, 0, previewSize, previewSize);

      const sizeLabel = document.createElement('div');
      sizeLabel.className = 'size';
      sizeLabel.textContent = `${size} x ${size}px`;

      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = 'Descargar';
      btn.onclick = () => downloadCanvas(canvas, `icon-${size}.png`);

      card.appendChild(preview);
      card.appendChild(sizeLabel);
      card.appendChild(btn);
      grid.appendChild(card);
    });

    function downloadAll() {
      SIZES.forEach((size, i) => {
        setTimeout(() => {
          downloadCanvas(canvasMap[size], `icon-${size}.png`);
        }, i * 200);
      });
    }
  </script>
</body>
</html>
